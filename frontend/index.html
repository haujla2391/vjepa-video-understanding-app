<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>VJEPA2 Video Understanding</title>
    </head>
    <body>
        <h1>Upload a Video</h1>

        <input type="file" id="videoInput" accept="video/*" onchange="previewVideo()" />

        <button onclick="uploadVideo()">Predict</button>

        <h2>Predictions:</h2>
        <ul id="results"></ul>

        <script src="script.js"></script>
    </body>
